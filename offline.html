<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آفلاین — AlumGlass</title>
    <link rel="stylesheet" href="/assets/css/design-system.css">
    <style>
        body {
            font-family: var(--ag-font-family, Tahoma, sans-serif);
            background: var(--ag-bg, #f8fafc);
            color: var(--ag-text, #1e293b);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .ag-offline {
            text-align: center;
            max-width: 380px;
        }
        .ag-offline svg {
            width: 96px;
            height: 96px;
            color: var(--ag-gray-400, #9ca3af);
            margin-bottom: 16px;
        }
        .ag-offline h1 {
            font-size: 1.5rem;
            margin: 0 0 8px;
            color: var(--ag-text, #1e293b);
        }
        .ag-offline p {
            color: var(--ag-text-muted, #6b7280);
            line-height: 1.6;
            margin: 0 0 20px;
        }
        .ag-offline button {
            background: var(--ag-primary, #1e40af);
            color: #fff;
            border: 0;
            padding: 10px 22px;
            border-radius: var(--ag-radius, 8px);
            font: inherit;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="ag-offline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
        <h1>ارتباط اینترنت برقرار نیست</h1>
        <p>در حال حاضر به اینترنت دسترسی ندارید. لطفاً پس از برقراری اتصال دوباره تلاش کنید.</p>
        <button type="button" onclick="location.reload()">تلاش مجدد</button>
    </div>
</body>
</html>
