name: alumglass

services:
  web:
    build:
      context: ./docker/web
    image: alumglass-web:latest
    container_name: alumglass-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      - ./:/var/www/html
      - alumglass-apache-logs:/var/log/apache2
    networks:
      - internal
      - devops
    expose:
      - "80"

  ws:
    image: node:20-alpine
    container_name: alumglass-ws
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./websocket:/app
    environment:
      NODE_ENV: production
      WS_PORT: "8090"
      PHP_AUTH_URL: "http://web/chat/api/verify_session.php"
    command: sh -c "npm install --omit=dev --no-audit --no-fund --prefer-offline && exec node server.js"
    networks:
      - internal
      - devops
    expose:
      - "8090"

  db:
    image: mariadb:11.4
    container_name: alumglass-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_COMMON_NAME}
    volumes:
      - alumglass-db-data:/var/lib/mysql
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  alumglass-db-data:
  alumglass-apache-logs:

networks:
  internal:
    driver: bridge
  devops:
    name: shahrzad-devops_devops-net
    external: true
